# warden rule store — verdict  sha256(exe)  path
#
# Starter allowlist installed on first setup so essential system networking
# (DNS, time sync, DHCP, package updates) works without a flood of prompts.
# These use "-" as the hash, meaning "match this path, don't pin the binary".
# Everything NOT listed here still prompts you the first time it connects.
#
# Edit freely, or just delete a line and let Warden ask you next time.

# DNS / name resolution
allow - /usr/lib/systemd/systemd-resolved
allow - /usr/sbin/named
# Time synchronisation
allow - /usr/lib/systemd/systemd-timesyncd
allow - /usr/sbin/chronyd
allow - /usr/sbin/ntpd
# Network management / DHCP
allow - /usr/sbin/NetworkManager
allow - /usr/lib/NetworkManager/nm-dhcp-helper
allow - /sbin/dhclient
allow - /usr/sbin/dhclient
allow - /usr/sbin/wpa_supplicant
# Package management & system updates
allow - /usr/bin/apt
allow - /usr/bin/apt-get
allow - /usr/lib/apt/methods/http
allow - /usr/lib/apt/methods/https
allow - /usr/bin/dpkg
allow - /usr/lib/snapd/snapd
allow - /usr/bin/snap
